<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Padel-klubben</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      color: #e8f0e9; font-family: 'DM Sans', sans-serif; min-height: 100vh;
      background-color: #0d2a1a;
      background-image:
        linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 200px 200px, 200px 200px, 100px 100px, 100px 100px;
      position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        linear-gradient(to bottom, transparent 49%, rgba(255,255,255,0.08) 49%, rgba(255,255,255,0.08) 51%, transparent 51%),
        linear-gradient(to right, transparent 49.5%, rgba(255,255,255,0.05) 49.5%, rgba(255,255,255,0.05) 50.5%, transparent 50.5%),
        radial-gradient(ellipse at 50% 50%, rgba(15,60,30,0.7) 0%, rgba(8,20,12,0.92) 100%);
      pointer-events: none; z-index: 0;
    }
    #root { position: relative; z-index: 1; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a3a2d; border-radius: 3px; }
    select option { background: #1a2e1e; color: #e8f0e9; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  // ── Supabase ────────────────────────────────────────────────────────────
  const SUPABASE_URL = "https://nnasbmcozkzjrpczjwpg.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5uYXNibWNvemt6anJwY3pqd3BnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMTc3MTcsImV4cCI6MjA5Nzc5MzcxN30.Eb8v72UVl5cuHcAcfsFSxwjmjMI3ezLRvGwl-HLw3dQ";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const KNOWN_PLAYERS = ["Mikkel", "Niko", "Roller", "Oli"];
  const VENUES = ["Albertslund (udendørs)", "Taastrup (udendørs)", "Hedehusene (udendørs)", "Indendørs"];

  const C = {
    bg: "transparent", surface: "rgba(10,28,16,0.85)", border: "rgba(255,255,255,0.09)",
    accent: "#7FFF6E", accentDim: "rgba(127,255,110,0.12)",
    red: "#FF5C5C", gold: "#FFD166", muted: "#4a5a4f", text: "#e8f0e9", sub: "#6b7d6e",
  };

  // ── Americano logic ─────────────────────────────────────────────────────
  function generateRounds(players) {
    const n = players.length;
    if (n < 4 || n % 2 !== 0) return [];
    const arr = [...players];
    const rounds = [];
    const maxRounds = Math.min(n - 1, 3);
    for (let r = 0; r < maxRounds; r++) {
      const pairs = [];
      for (let i = 0; i < n / 2; i++) pairs.push([arr[i], arr[n - 1 - i]]);
      const courts = [];
      for (let i = 0; i < pairs.length; i += 2)
        if (pairs[i + 1]) courts.push({ team1: pairs[i], team2: pairs[i + 1], score1: "", score2: "" });
      rounds.push(courts);
      const last = arr.pop();
      arr.splice(1, 0, last);
    }
    return rounds;
  }

  function calcStandings(players, rounds) {
    const pts = {};
    players.forEach(p => (pts[p] = 0));
    rounds.forEach(round => round.forEach(court => {
      const s1 = parseInt(court.score1), s2 = parseInt(court.score2);
      if (!isNaN(s1) && !isNaN(s2) && s1 + s2 === 24) {
        court.team1.forEach(p => (pts[p] = (pts[p] || 0) + s1));
        court.team2.forEach(p => (pts[p] = (pts[p] || 0) + s2));
      }
    }));
    return Object.entries(pts).sort((a, b) => b[1] - a[1]);
  }

  function calcAllTime(tournaments) {
    const pts = {}, played = {}, wins = {};
    KNOWN_PLAYERS.forEach(p => { pts[p] = 0; played[p] = 0; wins[p] = 0; });
    tournaments.forEach(t => {
      t.rounds.forEach(round => round.forEach(court => {
        const s1 = parseInt(court.score1), s2 = parseInt(court.score2);
        if (!isNaN(s1) && !isNaN(s2) && s1 + s2 === 24) {
          court.team1.forEach(p => { pts[p] = (pts[p]||0)+s1; played[p]=(played[p]||0)+1; if(s1>s2) wins[p]=(wins[p]||0)+1; });
          court.team2.forEach(p => { pts[p] = (pts[p]||0)+s2; played[p]=(played[p]||0)+1; if(s2>s1) wins[p]=(wins[p]||0)+1; });
        }
      }));
    });
    tournaments.forEach(t => t.players.forEach(p => { if(!(p in pts)){pts[p]=0;played[p]=0;wins[p]=0;} }));
    return Object.entries(pts)
      .map(([name, total]) => ({ name, total, played: played[name]||0, wins: wins[name]||0, avg: played[name] ? (total/played[name]).toFixed(1) : "—" }))
      .sort((a, b) => b.total - a.total);
  }

  // ── UI helpers ──────────────────────────────────────────────────────────
  const Mono = ({ children, style }) => <span style={{ fontFamily: "'DM Mono', monospace", ...style }}>{children}</span>;
  const Tag = ({ children, color = C.accent }) => (
    <span style={{ background: `${color}22`, color, border: `1px solid ${color}44`, borderRadius: 5, padding: "2px 8px", fontSize: 11, fontFamily: "'DM Mono', monospace", letterSpacing: 0.5 }}>{children}</span>
  );
  const Btn = ({ children, onClick, disabled, variant = "primary", small }) => (
    <button onClick={onClick} disabled={disabled} style={{
      background: disabled ? "#1e2a22" : variant === "primary" ? C.accent : variant === "danger" ? C.red : "rgba(255,255,255,0.06)",
      color: disabled ? C.muted : variant === "primary" ? "#0b1a0d" : "#fff",
      border: "none", borderRadius: 10, cursor: disabled ? "not-allowed" : "pointer",
      padding: small ? "8px 16px" : "13px 20px",
      fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: small ? 12 : 14, transition: "all 0.15s", letterSpacing: 0.3,
    }}>{children}</button>
  );
  const Input = ({ value, onChange, placeholder, type = "text", style, onKeyDown }) => (
    <input type={type} value={value} placeholder={placeholder} onChange={e => onChange(e.target.value)} onKeyDown={onKeyDown}
      style={{ background: "rgba(255,255,255,0.04)", border: `1px solid ${C.border}`, borderRadius: 10, padding: "12px 14px", color: C.text, fontSize: 14, fontFamily: "'DM Sans', sans-serif", outline: "none", width: "100%", boxSizing: "border-box", colorScheme: "dark", ...style }} />
  );
  const Select = ({ value, onChange, children }) => (
    <select value={value} onChange={e => onChange(e.target.value)}
      style={{ background: "rgba(10,28,16,0.95)", border: `1px solid ${C.border}`, borderRadius: 10, padding: "12px 14px", color: value ? C.text : C.sub, fontSize: 14, fontFamily: "'DM Sans', sans-serif", outline: "none", width: "100%", boxSizing: "border-box", colorScheme: "dark", cursor: "pointer" }}>
      {children}
    </select>
  );
  const Field = ({ label, children }) => (
    <div>
      <p style={{ margin: "0 0 7px", fontSize: 11, color: C.sub, fontFamily: "'DM Mono', monospace", textTransform: "uppercase", letterSpacing: 1 }}>{label}</p>
      {children}
    </div>
  );
  const BackBtn = ({ onClick }) => (
    <button onClick={onClick} style={{ background: "none", border: "none", color: C.sub, cursor: "pointer", fontSize: 14, padding: 0, display: "flex", alignItems: "center", gap: 6, fontFamily: "'DM Mono', monospace" }}>← Tilbage</button>
  );

  function Section({ title, children }) {
    return (
      <div style={{ marginBottom: 28 }}>
        <p style={{ fontSize: 10, color: C.sub, fontFamily: "'DM Mono', monospace", textTransform: "uppercase", letterSpacing: 2, marginBottom: 10 }}>{title}</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>{children}</div>
      </div>
    );
  }

  // ── Loading / Error ─────────────────────────────────────────────────────
  function LoadingScreen() {
    return (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", gap: 16 }}>
        <div style={{ fontSize: 48 }}>🎾</div>
        <p style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 24, letterSpacing: 2, color: C.accent }}>Henter data...</p>
      </div>
    );
  }

  function ErrorBanner({ msg }) {
    return (
      <div style={{ background: "rgba(255,92,92,0.15)", border: `1px solid ${C.red}44`, borderRadius: 10, padding: "12px 16px", margin: "0 20px 16px", color: C.red, fontSize: 13, fontFamily: "'DM Mono', monospace" }}>
        ⚠ {msg}
      </div>
    );
  }

  // ── Reset modal ─────────────────────────────────────────────────────────
  function ResetModal({ onConfirm, onCancel }) {
    return (
      <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ background: "#0f2018", border: `1px solid ${C.red}44`, borderRadius: 20, padding: "32px 24px", maxWidth: 360, width: "100%", textAlign: "center" }}>
          <div style={{ fontSize: 44, marginBottom: 12 }}>⚠️</div>
          <h3 style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 28, letterSpacing: 2, color: C.red, marginBottom: 10 }}>NULSTIL TURNERING?</h3>
          <p style={{ color: C.sub, fontSize: 14, lineHeight: 1.6, marginBottom: 28 }}>
            Dette sletter <strong style={{ color: C.text }}>alle turneringer og scores</strong> permanent og starter en helt ny sæson. Dette kan ikke fortrydes.
          </p>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={onCancel} style={{ flex: 1, padding: "13px 0", background: "rgba(255,255,255,0.06)", border: `1px solid ${C.border}`, borderRadius: 10, color: C.text, fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Annuller</button>
            <button onClick={onConfirm} style={{ flex: 1, padding: "13px 0", background: C.red, border: "none", borderRadius: 10, color: "#fff", fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Ja, nulstil</button>
          </div>
        </div>
      </div>
    );
  }

  // ── All-time leaderboard ────────────────────────────────────────────────
  function AllTimeLeaderboard({ tournaments, onViewTable }) {
    const rows = calcAllTime(tournaments);
    const medals = ["🥇", "🥈", "🥉"];
    const max = rows[0]?.total || 1;
    return (
      <div style={{ marginBottom: 28 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <p style={{ fontSize: 10, color: C.sub, fontFamily: "'DM Mono', monospace", textTransform: "uppercase", letterSpacing: 2, margin: 0 }}>ALL TIME LEADERBOARD</p>
          <button onClick={onViewTable} style={{ background: C.accentDim, border: `1px solid ${C.accent}44`, borderRadius: 8, padding: "4px 12px", color: C.accent, fontSize: 11, fontFamily: "'DM Mono', monospace", cursor: "pointer" }}>Se tabel →</button>
        </div>
        <div style={{ background: C.surface, borderRadius: 16, border: `1px solid ${C.border}`, overflow: "hidden" }}>
          {rows.map((r, i) => (
            <div key={r.name} style={{ padding: "13px 16px", borderBottom: i < rows.length - 1 ? `1px solid ${C.border}` : "none", display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ fontSize: i < 3 ? 18 : 13, minWidth: 24, textAlign: "center" }}>{medals[i] || `${i+1}.`}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: i === 0 ? C.accent : C.text, marginBottom: 4 }}>{r.name}</div>
                <div style={{ height: 4, background: "rgba(255,255,255,0.06)", borderRadius: 2, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${(r.total / max) * 100}%`, background: i === 0 ? C.accent : C.muted, borderRadius: 2, transition: "width 0.4s" }} />
                </div>
              </div>
              <div style={{ textAlign: "right", minWidth: 60 }}>
                <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 22, color: i === 0 ? C.accent : C.text, lineHeight: 1 }}>{r.total}</div>
                <div style={{ fontSize: 10, color: C.sub, fontFamily: "'DM Mono', monospace" }}>{r.played} k · ⌀{r.avg}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── Table screen ────────────────────────────────────────────────────────
  function TableScreen({ tournaments, onBack }) {
    const rows = calcAllTime(tournaments);
    const medals = ["🥇", "🥈", "🥉"];
    return (
      <div style={{ padding: "40px 20px 80px" }}>
        <BackBtn onClick={onBack} />
        <h2 style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 32, letterSpacing: 2, margin: "16px 0 6px", color: C.accent }}>TABEL</h2>
        <p style={{ color: C.sub, fontSize: 13, marginBottom: 24, fontFamily: "'DM Mono', monospace" }}>Akkumulerede point fra alle turneringer</p>
        <div style={{ background: C.surface, borderRadius: 16, border: `1px solid ${C.border}`, overflow: "hidden", marginBottom: 28 }}>
          <div style={{ display: "grid", gridTemplateColumns: "32px 1fr 56px 56px 56px 56px", padding: "10px 16px", borderBottom: `1px solid ${C.border}`, background: "rgba(255,255,255,0.03)" }}>
            {["#", "Spiller", "Pts", "K", "W", "⌀"].map(h => (
              <div key={h} style={{ fontSize: 10, color: C.sub, fontFamily: "'DM Mono', monospace", textTransform: "uppercase", letterSpacing: 1, textAlign: h !== "Spiller" ? "center" : "left" }}>{h}</div>
            ))}
          </div>
          {rows.map((r, i) => (
            <div key={r.name} style={{ display: "grid", gridTemplateColumns: "32px 1fr 56px 56px 56px 56px", padding: "13px 16px", borderBottom: i < rows.length - 1 ? `1px solid ${C.border}` : "none", background: i === 0 ? C.accentDim : "transparent" }}>
              <div style={{ fontSize: i < 3 ? 16 : 13, textAlign: "center" }}>{medals[i] || `${i+1}`}</div>
              <div style={{ fontWeight: 700, fontSize: 14, color: i === 0 ? C.accent : C.text }}>{r.name}</div>
              <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, color: i === 0 ? C.accent : C.text, textAlign: "center", lineHeight: 1.4 }}>{r.total}</div>
              <div style={{ fontSize: 13, color: C.sub, textAlign: "center", lineHeight: 1.8 }}>{r.played}</div>
              <div style={{ fontSize: 13, color: C.sub, textAlign: "center", lineHeight: 1.8 }}>{r.wins}</div>
              <div style={{ fontSize: 13, color: C.sub, textAlign: "center", lineHeight: 1.8 }}>{r.avg}</div>
            </div>
          ))}
        </div>
        <p style={{ fontSize: 10, color: C.sub, fontFamily: "'DM Mono', monospace", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12 }}>Turneringer</p>
        {tournaments.map(t => {
          const standings = calcStandings(t.players, t.rounds);
          const totalCourts = t.rounds.flatMap(r => r).length;
          const played = t.rounds.flatMap(r => r).filter(c => c.score1 !== "" && c.score2 !== "").length;
          return (
            <div key={t.id} style={{ background: C.surface, borderRadius: 14, border: `1px solid ${C.border}`, marginBottom: 10, overflow: "hidden" }}>
              <div style={{ padding: "12px 16px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(255,255,255,0.02)" }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{t.name}</div>
                  <div style={{ display: "flex", gap: 8, marginTop: 3 }}>
                    <Mono style={{ fontSize: 11, color: C.sub }}>{t.date}</Mono>
                    {t.venue && <Tag color={C.gold}>{t.venue}</Tag>}
                  </div>
                </div>
                <Mono style={{ fontSize: 11, color: C.sub }}>{played}/{totalCourts} kampe</Mono>
              </div>
              {standings.map(([player, pts], i) => (
                <div key={player} style={{ padding: "10px 16px", borderBottom: i < standings.length - 1 ? `1px solid ${C.border}` : "none", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                    <span style={{ fontSize: i < 3 ? 14 : 11, minWidth: 20 }}>{["🥇","🥈","🥉"][i] || `${i+1}.`}</span>
                    <span style={{ fontSize: 14, color: i === 0 ? C.accent : C.text }}>{player}</span>
                  </div>
                  <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, color: i === 0 ? C.accent : C.text }}>{pts} pt</span>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    );
  }

  // ── Tournament row ──────────────────────────────────────────────────────
  function TournamentRow({ t, onClick }) {
    const standings = calcStandings(t.players, t.rounds);
    const leader = standings[0];
    const played = t.rounds.flatMap(r => r).filter(c => c.score1 !== "" && c.score2 !== "").length;
    const total = t.rounds.flatMap(r => r).length;
    return (
      <div style={{ background: C.surface, borderRadius: 14, border: `1px solid ${C.border}`, overflow: "hidden", cursor: "pointer" }} onClick={onClick}>
        <div style={{ padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 3 }}>{t.name}</div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              <Mono style={{ fontSize: 11, color: C.sub }}>{t.date}</Mono>
              {t.venue && <Tag color={C.gold}>{t.venue}</Tag>}
              {leader && <span style={{ fontSize: 11, color: C.accent }}>🥇 {leader[0]}</span>}
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 11, color: C.sub, fontFamily: "'DM Mono', monospace" }}>{played}/{total} kampe</div>
            <div style={{ fontSize: 18, marginTop: 2 }}>›</div>
          </div>
        </div>
      </div>
    );
  }

  // ── Home ────────────────────────────────────────────────────────────────
  function HomeScreen({ tournaments, onOpenTournament, onNewTournament, onViewTable, onReset, error }) {
    const [showReset, setShowReset] = useState(false);
    return (
      <div style={{ padding: "48px 20px 80px" }}>
        {showReset && <ResetModal onConfirm={() => { onReset(); setShowReset(false); }} onCancel={() => setShowReset(false)} />}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 32 }}>
          <div>
            <h1 style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 40, letterSpacing: 3, margin: 0, color: C.accent }}>Padel-klubben</h1>
            <p style={{ margin: "2px 0 0", color: C.sub, fontSize: 13, fontFamily: "'DM Mono', monospace" }}>americano tracker</p>
          </div>
          {tournaments.length > 0 && (
            <button onClick={() => setShowReset(true)} style={{ background: "rgba(255,92,92,0.1)", border: `1px solid ${C.red}44`, borderRadius: 8, padding: "7px 12px", color: C.red, fontSize: 11, fontFamily: "'DM Mono', monospace", cursor: "pointer", marginTop: 6, whiteSpace: "nowrap" }}>
              🔄 Ny sæson
            </button>
          )}
        </div>
        {error && <ErrorBanner msg={error} />}
        <div style={{ display: "flex", gap: 10, marginBottom: 32 }}>
          <Btn onClick={onNewTournament}>🏆 Ny turnering</Btn>
          <Btn onClick={onViewTable} variant="ghost">📊 Tabel</Btn>
        </div>
        {tournaments.length > 0 && <AllTimeLeaderboard tournaments={tournaments} onViewTable={onViewTable} />}
        {tournaments.length > 0 && (
          <Section title="TURNERINGER">
            {tournaments.map(t => <TournamentRow key={t.id} t={t} onClick={() => onOpenTournament(t.id)} />)}
          </Section>
        )}
        {tournaments.length === 0 && (
          <div style={{ textAlign: "center", padding: "60px 0", color: C.muted }}>
            <div style={{ fontSize: 52, marginBottom: 12 }}>🎾</div>
            <p style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 22, letterSpacing: 1, color: C.sub }}>Ingen turneringer endnu</p>
            <p style={{ fontSize: 13 }}>Start med at oprette en turnering!</p>
          </div>
        )}
      </div>
    );
  }

  // ── New Tournament ──────────────────────────────────────────────────────
  function NewTournamentScreen({ onBack, onCreate }) {
    const [name, setName] = useState("");
    const [date, setDate] = useState(new Date().toISOString().split("T")[0]);
    const [venue, setVenue] = useState("");
    const [players, setPlayers] = useState([]);
    const [customInput, setCustomInput] = useState("");
    const [saving, setSaving] = useState(false);

    function toggleKnown(p) { setPlayers(prev => prev.includes(p) ? prev.filter(x => x !== p) : [...prev, p]); }
    function addCustom() {
      const t = customInput.trim();
      if (t && !players.includes(t)) setPlayers(p => [...p, t]);
      setCustomInput("");
    }

    const canCreate = name && venue && players.length >= 4 && players.length % 2 === 0;
    const numRounds = Math.min(players.length - 1, 3);

    async function handleCreate() {
      if (!canCreate || saving) return;
      setSaving(true);
      const rounds = generateRounds(players);
      await onCreate({ name, date, venue, players, rounds });
      setSaving(false);
    }

    return (
      <div style={{ padding: "40px 20px 80px" }}>
        <BackBtn onClick={onBack} />
        <h2 style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 32, letterSpacing: 2, margin: "16px 0 28px", color: C.accent }}>NY TURNERING</h2>
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <Field label="Turnerings navn"><Input value={name} onChange={setName} placeholder="f.eks. Fredagsturnering" /></Field>
          <Field label="Dato"><Input type="date" value={date} onChange={setDate} /></Field>
          <Field label="Bane">
            <Select value={venue} onChange={setVenue}>
              <option value="" disabled>Vælg bane...</option>
              {VENUES.map(v => <option key={v} value={v}>{v}</option>)}
            </Select>
          </Field>
          <Field label={`Spillere (${players.length}) — lige antal, min. 4`}>
            <p style={{ margin: "0 0 8px", fontSize: 12, color: C.sub }}>Vælg spillere:</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
              {KNOWN_PLAYERS.map(p => {
                const selected = players.includes(p);
                return (
                  <button key={p} onClick={() => toggleKnown(p)} style={{
                    padding: "9px 18px", borderRadius: 20, border: `1px solid ${selected ? C.accent : C.border}`,
                    background: selected ? C.accentDim : "rgba(255,255,255,0.03)",
                    color: selected ? C.accent : C.sub, fontFamily: "'DM Sans', sans-serif",
                    fontWeight: 600, fontSize: 14, cursor: "pointer", transition: "all 0.15s",
                  }}>{selected ? "✓ " : ""}{p}</button>
                );
              })}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <Input value={customInput} onChange={setCustomInput} placeholder="Tilføj anden spiller..." style={{ flex: 1 }} onKeyDown={e => e.key === "Enter" && addCustom()} />
              <Btn onClick={addCustom} disabled={!customInput.trim()} small>+</Btn>
            </div>
            {players.filter(p => !KNOWN_PLAYERS.includes(p)).length > 0 && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
                {players.filter(p => !KNOWN_PLAYERS.includes(p)).map(p => (
                  <span key={p} onClick={() => setPlayers(prev => prev.filter(x => x !== p))} style={{ background: C.accentDim, color: C.accent, border: `1px solid ${C.accent}44`, borderRadius: 20, padding: "5px 12px", fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                    {p} <span style={{ opacity: 0.6, fontSize: 11 }}>✕</span>
                  </span>
                ))}
              </div>
            )}
            {players.length % 2 !== 0 && players.length > 0 && (
              <p style={{ color: C.red, fontSize: 12, margin: "8px 0 0", fontFamily: "'DM Mono', monospace" }}>⚠ Tilføj 1 spiller mere</p>
            )}
          </Field>
          {canCreate && (
            <div style={{ background: C.accentDim, borderRadius: 12, padding: "12px 16px", border: `1px solid ${C.accent}33` }}>
              <p style={{ margin: 0, fontSize: 13, color: C.accent, fontFamily: "'DM Mono', monospace" }}>
                🎾 {numRounds} runder · {Math.floor(players.length / 4)} bane{Math.floor(players.length / 4) > 1 ? "r" : ""} per runde · {venue}
              </p>
            </div>
          )}
          <Btn onClick={handleCreate} disabled={!canCreate || saving}>{saving ? "Gemmer..." : "🏆 Opret turnering"}</Btn>
        </div>
      </div>
    );
  }

  // ── Court card ──────────────────────────────────────────────────────────
  function CourtCard({ court, courtNum, onScore1, onScore2 }) {
    const s1 = parseInt(court.score1), s2 = parseInt(court.score2);
    const valid = !isNaN(s1) && !isNaN(s2) && s1 + s2 === 24;
    const t1Wins = valid && s1 > s2, t2Wins = valid && s2 > s1;
    const scoreStyle = { background: "rgba(255,255,255,0.07)", border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 10px", color: C.text, fontSize: 22, fontFamily: "'Bebas Neue', sans-serif", outline: "none", width: "100%", boxSizing: "border-box", colorScheme: "dark", textAlign: "center", letterSpacing: 1 };
    return (
      <div style={{ background: C.surface, borderRadius: 14, border: `1px solid ${valid ? C.accent + "44" : C.border}`, overflow: "hidden" }}>
        <div style={{ padding: "8px 16px", background: valid ? C.accentDim : "transparent", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 10, color: C.sub, fontFamily: "'DM Mono', monospace", letterSpacing: 1 }}>BANE {courtNum}</span>
          {valid && <Tag color={C.accent}>✓ {s1}–{s2}</Tag>}
          {!valid && court.score1 !== "" && <Tag color={C.red}>skal give 24 i alt</Tag>}
        </div>
        <div style={{ padding: "12px 16px", display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 10, alignItems: "center" }}>
          <div style={{ background: t1Wins ? C.accentDim : "rgba(255,255,255,0.03)", borderRadius: 10, padding: "10px 12px", border: `1px solid ${t1Wins ? C.accent + "44" : "transparent"}` }}>
            <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8, color: t1Wins ? C.accent : C.text }}>{court.team1.join(" & ")}</div>
            <input type="number" min="0" max="24" value={court.score1} onChange={e => onScore1(e.target.value)} placeholder="0" style={scoreStyle} />
          </div>
          <span style={{ fontFamily: "'Bebas Neue', sans-serif", color: C.muted, fontSize: 18 }}>VS</span>
          <div style={{ background: t2Wins ? C.accentDim : "rgba(255,255,255,0.03)", borderRadius: 10, padding: "10px 12px", border: `1px solid ${t2Wins ? C.accent + "44" : "transparent"}` }}>
            <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8, color: t2Wins ? C.accent : C.text }}>{court.team2.join(" & ")}</div>
            <input type="number" min="0" max="24" value={court.score2} onChange={e => onScore2(e.target.value)} placeholder="0" style={scoreStyle} />
          </div>
        </div>
      </div>
    );
  }

  function StandingRow({ player, pts, rank }) {
    const medals = ["🥇", "🥈", "🥉"];
    return (
      <div style={{ background: rank === 1 ? C.accentDim : C.surface, border: `1px solid ${rank === 1 ? C.accent + "44" : C.border}`, borderRadius: 12, padding: "14px 18px", marginBottom: 8, display: "flex", alignItems: "center", gap: 14 }}>
        <span style={{ fontSize: rank <= 3 ? 22 : 16, minWidth: 28, textAlign: "center" }}>{medals[rank - 1] || rank}</span>
        <div style={{ flex: 1, fontWeight: 600, fontSize: 15, color: rank === 1 ? C.accent : C.text }}>{player}</div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 26, color: rank === 1 ? C.accent : C.text, lineHeight: 1 }}>{pts}</div>
          <div style={{ fontSize: 10, color: C.sub, fontFamily: "'DM Mono', monospace" }}>point</div>
        </div>
      </div>
    );
  }

  // ── Tournament screen ───────────────────────────────────────────────────
  function TournamentScreen({ tournament, onBack, onUpdateScore }) {
    const [tab, setTab] = useState("kampe");
    const { name, date, venue, players, rounds } = tournament;
    const standings = calcStandings(players, rounds);
    const totalCourts = rounds.flatMap(r => r).length;
    const playedCourts = rounds.flatMap(r => r).filter(c => c.score1 !== "" && c.score2 !== "").length;
    return (
      <div style={{ padding: "40px 20px 80px" }}>
        <BackBtn onClick={onBack} />
        <div style={{ margin: "16px 0 6px" }}>
          <h2 style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 30, letterSpacing: 2, margin: 0 }}>{name}</h2>
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 6, flexWrap: "wrap" }}>
            <Mono style={{ fontSize: 12, color: C.sub }}>{date}</Mono>
            {venue && <Tag color={C.gold}>{venue}</Tag>}
            <Tag>{players.length} spillere</Tag>
            <Mono style={{ fontSize: 12, color: C.sub }}>{playedCourts}/{totalCourts} spillet</Mono>
          </div>
        </div>
        <div style={{ height: 4, background: C.surface, borderRadius: 2, margin: "14px 0 20px", overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${totalCourts ? (playedCourts / totalCourts) * 100 : 0}%`, background: C.accent, borderRadius: 2, transition: "width 0.3s" }} />
        </div>
        <div style={{ display: "flex", gap: 4, marginBottom: 24, background: C.surface, borderRadius: 12, padding: 4 }}>
          {[["kampe", "Kampe"], ["stilling", "Stilling"]].map(([v, l]) => (
            <button key={v} onClick={() => setTab(v)} style={{ flex: 1, padding: "10px 0", border: "none", borderRadius: 9, cursor: "pointer", background: tab === v ? C.accent : "transparent", color: tab === v ? "#0b1a0d" : C.sub, fontWeight: 700, fontSize: 13, fontFamily: "'DM Sans', sans-serif", transition: "all 0.15s" }}>{l}</button>
          ))}
        </div>
        {tab === "kampe" && rounds.map((courts, ri) => (
          <div key={ri} style={{ marginBottom: 24 }}>
            <p style={{ fontSize: 11, color: C.sub, fontFamily: "'DM Mono', monospace", textTransform: "uppercase", letterSpacing: 2, marginBottom: 10 }}>Runde {ri + 1}</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {courts.map((court, ci) => (
                <CourtCard key={ci} court={court} courtNum={ci + 1}
                  onScore1={v => onUpdateScore(ri, ci, "score1", v)}
                  onScore2={v => onUpdateScore(ri, ci, "score2", v)} />
              ))}
            </div>
          </div>
        ))}
        {tab === "stilling" && (
          <div>{standings.map(([player, pts], i) => <StandingRow key={player} player={player} pts={pts} rank={i + 1} />)}</div>
        )}
      </div>
    );
  }

  // ── App ─────────────────────────────────────────────────────────────────
  function App() {
    const [screen, setScreen] = useState("home");
    const [tournaments, setTournaments] = useState([]);
    const [activeTid, setActiveTid] = useState(null);
    const [loading, setLoading] = useState(true);
    const [error, setError] = useState(null);
    const saveTimers = useRef({});
    const pendingEdits = useRef(new Set()); // tournament ids with unsaved local edits
    const tournamentsRef = useRef([]); // always-current snapshot, avoids stale closures

    useEffect(() => { tournamentsRef.current = tournaments; }, [tournaments]);

    // Load tournaments from Supabase on mount + subscribe to realtime changes
    useEffect(() => {
      loadTournaments();

      const channel = sb.channel("tournaments-changes")
        .on("postgres_changes", { event: "*", schema: "public", table: "tournaments" }, () => {
          loadTournaments();
        })
        .subscribe();

      return () => sb.removeChannel(channel);
    }, []);

    async function loadTournaments() {
      try {
        const { data, error } = await sb.from("tournaments").select("*").order("created_at", { ascending: false });
        if (error) throw error;
        setTournaments(prev => data.map(row => {
          // If this tournament has unsaved local edits, keep the local version instead of overwriting
          if (pendingEdits.current.has(row.id)) {
            const local = prev.find(t => t.id === row.id);
            if (local) return local;
          }
          return { ...row, players: row.players, rounds: row.rounds };
        }));
        setError(null);
      } catch (e) {
        setError("Kunne ikke hente data: " + e.message);
      } finally {
        setLoading(false);
      }
    }

    async function createTournament(t) {
      try {
        const { data, error } = await sb.from("tournaments").insert([{
          name: t.name, date: t.date, venue: t.venue,
          players: t.players, rounds: t.rounds,
        }]).select().single();
        if (error) throw error;
        setActiveTid(data.id);
        setScreen("tournament");
        setError(null);
      } catch (e) {
        setError("Kunne ikke oprette turnering: " + e.message);
      }
    }

    async function updateScore(tid, ri, ci, field, val) {
      pendingEdits.current.add(tid);

      // Use tournamentsRef (always current) instead of the closured `tournaments` state
      const current = tournamentsRef.current.find(t => t.id === tid);
      if (!current) { console.warn("updateScore: tournament not found", tid); return; }
      const newRounds = current.rounds.map((round, rIdx) =>
        rIdx !== ri ? round : round.map((court, cIdx) =>
          cIdx !== ci ? court : { ...court, [field]: val }
        )
      );

      setTournaments(prev => prev.map(t => t.id === tid ? { ...t, rounds: newRounds } : t));

      clearTimeout(saveTimers.current[tid]);
      saveTimers.current[`${tid}_rounds`] = newRounds;
      saveTimers.current[tid] = setTimeout(async () => {
        const roundsToSave = saveTimers.current[`${tid}_rounds`];
        if (!roundsToSave) { console.warn("No rounds to save for", tid); return; }
        try {
          console.log("Saving rounds to Supabase for tournament", tid, roundsToSave);
          const { data, error } = await sb.from("tournaments").update({ rounds: roundsToSave }).eq("id", tid).select();
          if (error) throw error;
          console.log("Saved successfully:", data);
          pendingEdits.current.delete(tid);
        } catch (e) {
          console.error("Save failed:", e);
          setError("Kunne ikke gemme score: " + e.message);
        }
      }, 600);
    }

    async function resetAll() {
      try {
        const { error } = await sb.from("tournaments").delete().neq("id", 0);
        if (error) throw error;
        setTournaments([]);
        setActiveTid(null);
        setScreen("home");
        setError(null);
      } catch (e) {
        setError("Kunne ikke nulstille: " + e.message);
      }
    }

    if (loading) return <LoadingScreen />;

    const activeTournament = tournaments.find(t => t.id === activeTid);

    return (
      <div style={{ minHeight: "100vh", background: "transparent", color: C.text, fontFamily: "'DM Sans', sans-serif", maxWidth: 500, margin: "0 auto" }}>
        {screen === "home" && (
          <HomeScreen tournaments={tournaments} error={error}
            onOpenTournament={id => { setActiveTid(id); setScreen("tournament"); }}
            onNewTournament={() => setScreen("newTournament")}
            onViewTable={() => setScreen("table")}
            onReset={resetAll}
          />
        )}
        {screen === "newTournament" && (
          <NewTournamentScreen onBack={() => setScreen("home")} onCreate={createTournament} />
        )}
        {screen === "tournament" && activeTournament && (
          <TournamentScreen
            tournament={activeTournament}
            onBack={() => setScreen("home")}
            onUpdateScore={(ri, ci, field, val) => updateScore(activeTournament.id, ri, ci, field, val)}
          />
        )}
        {screen === "table" && (
          <TableScreen tournaments={tournaments} onBack={() => setScreen("home")} />
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
